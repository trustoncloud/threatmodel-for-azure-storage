title: Azure Storage C185 - Blob Move
id: d4dc710d-8e3f-43c6-9a80-e96f33ba82ce
status: experimental
description: Monitor for blob move operations on blob storage (e.g., by using an Azure custom policy on authorization.action where the value is "Microsoft.Storage/storageAccounts/blobServices/containers/blobs/move/action" in Audit mode).
testing: Perform a blob move operation; it should be detected.
notes: |
    Fires on a blob move or rename (`RenamePathFile` / `SftpRename`) unless the account is in `%authorized_storage_accounts_c185%`.
references:
    - https://learn.microsoft.com/en-us/azure/storage/blobs/monitor-blob-storage-reference
    - https://learn.microsoft.com/en-us/rest/api/storageservices/datalakestoragegen2/path/create
    - https://learn.microsoft.com/en-us/azure/storage/blobs/data-lake-storage-introduction
author: TrustOnCloud
date: 2026-06-06
tags:
    - trustoncloud.azure.storage
    - trustoncloud.control.storage.c185
logsource:
    product: azure
    service: storagebloblogs
detection:
    selection:
        OperationName:
            - RenamePathFile
            - SftpRename
    filter_authorized_account:
        AccountName|expand: '%authorized_storage_accounts_c185%'
    condition: selection and not filter_authorized_account
falsepositives:
    - Blob moves in authorized accounts not yet added to the allowlist.
level: low

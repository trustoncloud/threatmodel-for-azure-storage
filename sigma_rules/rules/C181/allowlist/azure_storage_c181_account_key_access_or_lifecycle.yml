title: Azure Storage C181 - Storage Account Key Access Or Lifecycle
id: 16dad841-f1a7-4f6a-a72f-3a69a80b3f23
status: experimental
description: Monitor Azure activity log for storage account key access and lifecycle operations (e.g., by using an Azure custom policy on authorization.action where value is "Microsoft.Storage/storageAccounts/listKeys/action", "Microsoft.Storage/storageAccounts/regenerateKey/action", or "Microsoft.Storage/storageAccounts/rotateKey/action" in Audit mode).
testing: Perform a storage account key access or lifecycle operation; it should be detected.
notes: |
    Fires on a storage-account key operation (`listKeys` / `regenerateKey` / `rotateKey`) unless the caller is in `%authorized_callers_c181%`.
references:
    - https://learn.microsoft.com/en-us/azure/storage/common/storage-account-keys-manage
    - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations#microsoftstorage
    - https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log-schema
author: TrustOnCloud
date: 2026-06-06
tags:
    - trustoncloud.azure.storage
    - trustoncloud.control.storage.c181
logsource:
    product: azure
    service: activity
detection:
    selection:
        OperationNameValue|contains:
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/LISTKEYS/ACTION'
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/REGENERATEKEY/ACTION'
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/ROTATEKEY/ACTION'
        ActivityStatusValue:
            - Success
            - Failure
            - Failed
    filter_authorized_caller:
        Caller|expand: '%authorized_callers_c181%'
    condition: selection and not filter_authorized_caller
falsepositives:
    - Authorized key-reading principals not yet added to the allowlist.
level: high

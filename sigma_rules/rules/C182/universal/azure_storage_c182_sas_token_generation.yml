title: Azure Storage C182 - SAS Token Generation
id: 5ec2345d-f947-41aa-99ad-c1c54bfc8407
status: experimental
description: Monitor the Azure activity log for SAS token generation operations on storage accounts (e.g., by using an Azure custom policy on authorization.action where the value is "Microsoft.Storage/storageAccounts/ListAccountSas/action" or "Microsoft.Storage/storageAccounts/ListServiceSas/action" in Audit mode).
testing: Perform a SAS token generation operation on a storage account; it should be detected.
notes: |
    Fires when an account or service SAS token is generated (`ListAccountSas` / `ListServiceSas`).
references:
    - https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview
    - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations#microsoftstorage
    - https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log-schema
author: TrustOnCloud
date: 2026-06-06
tags:
    - trustoncloud.azure.storage
    - trustoncloud.control.storage.c182
logsource:
    product: azure
    service: activity
detection:
    selection:
        OperationNameValue|contains:
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/LISTACCOUNTSAS/ACTION'
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/LISTSERVICESAS/ACTION'
        ActivityStatusValue:
            - Success
            - Failure
            - Failed
    condition: selection
falsepositives:
    - Applications and automation that legitimately mint SAS tokens.
level: medium

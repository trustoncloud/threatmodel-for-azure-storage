title: Azure Storage C184 - Storage Account Failover
id: ce6e6110-1b11-43df-98da-19495cb1b1b6
status: experimental
description: Monitor the Azure activity log for storage account failover operations (e.g., by using an Azure custom policy on authorization.action where the value is "Microsoft.Storage/storageAccounts/failover/action" in Audit mode).
testing: Perform a storage account failover operation; it should be detected.
notes: |
    Fires on a storage-account failover (`storageAccounts/failover`), which promotes the secondary region and can drop writes not yet replicated.
references:
    - https://learn.microsoft.com/en-us/azure/storage/common/storage-disaster-recovery-guidance
    - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations#microsoftstorage
    - https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log-schema
author: TrustOnCloud
date: 2026-06-06
tags:
    - trustoncloud.azure.storage
    - trustoncloud.control.storage.c184
logsource:
    product: azure
    service: activity
detection:
    selection:
        OperationNameValue|contains: 'MICROSOFT.STORAGE/STORAGEACCOUNTS/FAILOVER/ACTION'
        ActivityStatusValue:
            - Success
            - Failure
            - Failed
    condition: selection
falsepositives:
    - Planned disaster-recovery drills or approved regional failovers.
level: high

title: Azure Storage C179 - Blob Container Legal Hold Or Immutability Change
id: 8c18f5a3-962c-4054-800e-202b659acc18
status: experimental
description: Monitor Azure activity log for configuration operations on blob storage containers (e.g., by using an Azure custom policy on authorization.action where the value is "Microsoft.Storage/storageAccounts/blobServices/containers/clearLegalHold/action", "Microsoft.Storage/storageAccounts/blobServices/containers/immutabilityPolicies/write", or "Microsoft.Storage/storageAccounts/blobServices/containers/setLegalHold/action" in Audit mode).
testing: Perform a configuration change on a blob storage container; it should be detected.
notes: |
    Fires on a legal-hold or immutability (WORM) policy change to a blob container: setting or clearing a legal hold, or writing an immutability policy.
references:
    - https://learn.microsoft.com/en-us/azure/storage/blobs/immutable-storage-overview
    - https://learn.microsoft.com/en-us/azure/storage/blobs/immutable-legal-hold-overview
    - https://learn.microsoft.com/en-us/azure/role-based-access-control/resource-provider-operations#microsoftstorage
    - https://learn.microsoft.com/en-us/azure/azure-monitor/essentials/activity-log-schema
author: TrustOnCloud
date: 2026-06-06
tags:
    - trustoncloud.azure.storage
    - trustoncloud.control.storage.c179
logsource:
    product: azure
    service: activity
detection:
    selection:
        OperationNameValue|contains:
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/BLOBSERVICES/CONTAINERS/CLEARLEGALHOLD/ACTION'
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/BLOBSERVICES/CONTAINERS/IMMUTABILITYPOLICIES/WRITE'
            - 'MICROSOFT.STORAGE/STORAGEACCOUNTS/BLOBSERVICES/CONTAINERS/SETLEGALHOLD/ACTION'
        ActivityStatusValue:
            - Success
            - Failure
            - Failed
    condition: selection
falsepositives:
    - Approved compliance or retention automation that manages legal holds and immutability policies.
level: medium
